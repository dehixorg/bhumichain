name: BhumiChain — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RG: bhumichain-rg
  ACR: bhumichainacr
  ACR_SERVER: bhumichainacr.azurecr.io
  ACA_ENV: bhumichain-env

jobs:
  # ── Build and push Docker images to ACR ──────────────────────────────────
  build:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: backend/api-gateway
          - service: frontend
            context: frontend/web-portal
          - service: record-scan
            context: backend/ai-services/record-scan
          - service: coparcenary-mapper
            context: backend/ai-services/coparcenary-mapper
          - service: nyaya-ai
            context: backend/ai-services/nyaya-ai
          - service: bhumi-settle
            context: backend/ai-services/bhumi-settle
          - service: valuation-oracle
            context: backend/ai-services/valuation-oracle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR }}

      - name: Build & push ${{ matrix.service }}
        run: |
          TAG=${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          LATEST=${{ env.ACR_SERVER }}/${{ matrix.service }}:latest
          docker build -t "$TAG" -t "$LATEST" ${{ matrix.context }}
          docker push "$TAG"
          docker push "$LATEST"

  # ── Deploy to Azure Container Apps ───────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy internal AI services
        run: |
          for SVC in record-scan coparcenary-mapper nyaya-ai bhumi-settle valuation-oracle; do
            PORT_MAP=("record-scan=8010" "coparcenary-mapper=8011" "nyaya-ai=8012" "bhumi-settle=8013" "valuation-oracle=8001")
            az containerapp update \
              --name "$SVC" \
              --resource-group ${{ env.RG }} \
              --image ${{ env.ACR_SERVER }}/${SVC}:${{ github.sha }} \
              --output none
            echo "✓ $SVC updated"
          done

      - name: Deploy API gateway
        run: |
          az containerapp update \
            --name api-gateway \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR_SERVER }}/api-gateway:${{ github.sha }} \
            --set-env-vars \
              NODE_ENV=production \
              PORT=4000 \
              FABRIC_MODE=mock \
              AADHAAR_MOCK=true \
              ORACLE_MODE=mock \
              JWT_SECRET=${{ secrets.JWT_SECRET }} \
              JWT_EXPIRY=8h \
              AADHAAR_SALT=${{ secrets.AADHAAR_SALT }} \
              AZURE_AI_ENDPOINT=${{ secrets.AZURE_AI_ENDPOINT }} \
              AZURE_AI_KEY=${{ secrets.AZURE_AI_KEY }} \
              AZURE_AI_MODEL=gpt-5.4 \
              AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              AWS_REGION=ap-south-1 \
              DYNAMODB_TABLE=testArpit \
            --output none
          echo "✓ api-gateway updated"

      - name: Deploy frontend
        run: |
          API_FQDN=$(az containerapp show \
            --name api-gateway --resource-group ${{ env.RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          az containerapp update \
            --name frontend \
            --resource-group ${{ env.RG }} \
            --image ${{ env.ACR_SERVER }}/frontend:${{ github.sha }} \
            --set-env-vars \
              NODE_ENV=production \
              NEXT_PUBLIC_API_URL=https://${API_FQDN} \
              NEXT_PUBLIC_WS_URL=wss://${API_FQDN}/ws \
              NEXT_PUBLIC_FABRIC_MODE=mock \
              NEXT_PUBLIC_MAP_CENTER_LAT=28.5706 \
              NEXT_PUBLIC_MAP_CENTER_LNG=77.5413 \
              NEXT_PUBLIC_MAP_ZOOM=12 \
            --output none
          echo "✓ frontend updated"

      - name: Print deployment URLs
        run: |
          FE=$(az containerapp show \
            --name frontend --resource-group ${{ env.RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          API=$(az containerapp show \
            --name api-gateway --resource-group ${{ env.RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://${FE} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | https://${API} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | https://${API}/health |" >> $GITHUB_STEP_SUMMARY

  # ── AWS: ensure DynamoDB tables exist ────────────────────────────────────
  aws-infra:
    name: Ensure AWS DynamoDB tables
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Create DynamoDB tables (idempotent)
        run: |
          TABLES=(
            "bhumichain-notifications:dlpiId:S:notificationId:S"
            "bhumichain-tokens:aadhaarHash:S:tokenId:S"
            "bhumichain-ec-cache:dlpiId:S:ecId:S"
            "bhumichain-analytics:eventDate:S:eventId:S"
          )
          for ENTRY in "${TABLES[@]}"; do
            IFS=':' read -r TABLE PK PK_TYPE SK SK_TYPE <<< "$ENTRY"
            if aws dynamodb describe-table --table-name "$TABLE" &>/dev/null; then
              echo "✓ $TABLE exists"
            else
              aws dynamodb create-table \
                --table-name "$TABLE" \
                --attribute-definitions \
                  AttributeName="${PK}",AttributeType="${PK_TYPE}" \
                  AttributeName="${SK}",AttributeType="${SK_TYPE}" \
                --key-schema \
                  AttributeName="${PK}",KeyType=HASH \
                  AttributeName="${SK}",KeyType=RANGE \
                --billing-mode PAY_PER_REQUEST \
                --output none
              echo "✓ $TABLE created"
            fi
          done
