version: '3.8'

networks:
  bhumichain:
    name: bhumichain_network

volumes:
  orderer.bhumichain.in:
  peer0.revenuedept.bhumichain.in:
  peer1.revenuedept.bhumichain.in:
  couchdb0:
  couchdb1:

services:

  # ── Fabric CA ────────────────────────────────────────────────────────────────
  ca.revenuedept.bhumichain.in:
    image: hyperledger/fabric-ca:1.5
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-revenuedept
      FABRIC_CA_SERVER_TLS_ENABLED: "true"
      FABRIC_CA_SERVER_PORT: 7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./crypto-config/peerOrganizations/revenuedept.bhumichain.in/ca/:/etc/hyperledger/fabric-ca-server
    networks:
      - bhumichain

  # ── Orderer ──────────────────────────────────────────────────────────────────
  orderer.bhumichain.in:
    image: hyperledger/fabric-orderer:2.5
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: "true"
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_CLUSTER_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_GENERAL_BOOTSTRAPMETHOD: none
      ORDERER_CHANNELPARTICIPATION_ENABLED: "true"
      ORDERER_ADMIN_TLS_ENABLED: "true"
      ORDERER_ADMIN_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_ADMIN_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_ADMIN_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_ADMIN_TLS_CLIENTROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:7053
      ORDERER_OPERATIONS_LISTENADDRESS: 0.0.0.0:17050
      ORDERER_METRICS_PROVIDER: prometheus
    working_dir: /root
    command: orderer
    volumes:
      - ./crypto-config/ordererOrganizations/bhumichain.in/orderers/orderer.bhumichain.in/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/bhumichain.in/orderers/orderer.bhumichain.in/tls:/var/hyperledger/orderer/tls
      - orderer.bhumichain.in:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
      - "17050:17050"
    networks:
      - bhumichain

  # ── CouchDB for peer0 ────────────────────────────────────────────────────────
  couchdb0:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb0:/opt/couchdb/data
    networks:
      - bhumichain

  # ── Peer 0 ───────────────────────────────────────────────────────────────────
  peer0.revenuedept.bhumichain.in:
    image: hyperledger/fabric-peer:2.5
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: bhumichain_network
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_PROFILE_ENABLED: "false"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.revenuedept.bhumichain.in
      CORE_PEER_ADDRESS: peer0.revenuedept.bhumichain.in:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.revenuedept.bhumichain.in:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer1.revenuedept.bhumichain.in:9051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.revenuedept.bhumichain.in:7051
      CORE_PEER_LOCALMSPID: RevenueDeptMSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
      CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:17051
      CORE_METRICS_PROVIDER: prometheus
      CORE_LEDGER_STATE_STATEDATABASE: CouchDB
      CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS: couchdb0:5984
      CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME: admin
      CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD: adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/revenuedept.bhumichain.in/peers/peer0.revenuedept.bhumichain.in/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/revenuedept.bhumichain.in/peers/peer0.revenuedept.bhumichain.in/tls:/etc/hyperledger/fabric/tls
      - peer0.revenuedept.bhumichain.in:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
      - "17051:17051"
    depends_on:
      - couchdb0
      - orderer.bhumichain.in
    networks:
      - bhumichain

  # ── CouchDB for peer1 ────────────────────────────────────────────────────────
  couchdb1:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpw
    ports:
      - "7984:5984"
    volumes:
      - couchdb1:/opt/couchdb/data
    networks:
      - bhumichain

  # ── Peer 1 ───────────────────────────────────────────────────────────────────
  peer1.revenuedept.bhumichain.in:
    image: hyperledger/fabric-peer:2.5
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: bhumichain_network
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_PROFILE_ENABLED: "false"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer1.revenuedept.bhumichain.in
      CORE_PEER_ADDRESS: peer1.revenuedept.bhumichain.in:9051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:9051
      CORE_PEER_CHAINCODEADDRESS: peer1.revenuedept.bhumichain.in:9052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:9052
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer1.revenuedept.bhumichain.in:9051
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.revenuedept.bhumichain.in:7051
      CORE_PEER_LOCALMSPID: RevenueDeptMSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
      CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:17052
      CORE_METRICS_PROVIDER: prometheus
      CORE_LEDGER_STATE_STATEDATABASE: CouchDB
      CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS: couchdb1:5984
      CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME: admin
      CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD: adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/revenuedept.bhumichain.in/peers/peer1.revenuedept.bhumichain.in/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/revenuedept.bhumichain.in/peers/peer1.revenuedept.bhumichain.in/tls:/etc/hyperledger/fabric/tls
      - peer1.revenuedept.bhumichain.in:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
      - "9051:9051"
      - "17052:17052"
    depends_on:
      - couchdb1
      - orderer.bhumichain.in
    networks:
      - bhumichain

  # ── CLI (for chaincode operations) ───────────────────────────────────────────
  cli:
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      GOPATH: /opt/gopath
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_ID: cli
      CORE_PEER_ADDRESS: peer0.revenuedept.bhumichain.in:7051
      CORE_PEER_LOCALMSPID: RevenueDeptMSP
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/revenuedept.bhumichain.in/peers/peer0.revenuedept.bhumichain.in/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/revenuedept.bhumichain.in/peers/peer0.revenuedept.bhumichain.in/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/revenuedept.bhumichain.in/peers/peer0.revenuedept.bhumichain.in/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/revenuedept.bhumichain.in/users/Admin@revenuedept.bhumichain.in/msp
      ORDERER_CA: /opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/ordererOrganizations/bhumichain.in/orderers/orderer.bhumichain.in/msp/tlscacerts/tlsca.bhumichain.in-cert.pem
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../../../blockchain/chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
    depends_on:
      - peer0.revenuedept.bhumichain.in
      - peer1.revenuedept.bhumichain.in
    networks:
      - bhumichain
