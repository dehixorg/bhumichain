Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/bhumichain.in/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &RevenueDept
    Name: RevenueDeptMSP
    ID: RevenueDeptMSP
    MSPDir: crypto-config/peerOrganizations/revenuedept.bhumichain.in/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RevenueDeptMSP.admin', 'RevenueDeptMSP.peer', 'RevenueDeptMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RevenueDeptMSP.admin', 'RevenueDeptMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RevenueDeptMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RevenueDeptMSP.peer')"
    AnchorPeers:
      - Host: peer0.revenuedept.bhumichain.in
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.bhumichain.in:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.bhumichain.in
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/bhumichain.in/orderers/orderer.bhumichain.in/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/bhumichain.in/orderers/orderer.bhumichain.in/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  BhumiChainGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *RevenueDept
      Capabilities:
        <<: *ApplicationCapabilities
    Consortiums:
      BhumiConsortium:
        Organizations:
          - *RevenueDept

  LandRegistryChannel:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *RevenueDept
      Capabilities:
        <<: *ApplicationCapabilities
    Consortiums:
      BhumiConsortium:
        Organizations:
          - *RevenueDept
