<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#003A7A"/>

  <!-- Outer radial rays (sun pattern like Aadhaar) -->
  <g opacity="0.25" fill="#4DA6FF">
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(0 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(22.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(45 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(67.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(90 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(112.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(135 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(157.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(180 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(202.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(225 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(247.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(270 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(292.5 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(315 100 100)"/>
    <rect x="98" y="10" width="4" height="24" rx="2" transform="rotate(337.5 100 100)"/>
  </g>

  <!-- Inner lighter circle -->
  <circle cx="100" cy="100" r="62" fill="#004FA3"/>

  <!-- Fingerprint arcs (concentric, open arcs for fingerprint look) -->
  <!-- Outer arc -->
  <path d="M 100 50 A 50 50 0 0 1 150 100" fill="none" stroke="#7EC8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 50 100 A 50 50 0 0 1 100 50" fill="none" stroke="#7EC8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 150 100 A 50 50 0 0 1 100 150" fill="none" stroke="#7EC8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 100 150 A 50 50 0 0 1 50 100" fill="none" stroke="#7EC8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Mid arc -->
  <path d="M 100 63 A 37 37 0 0 1 137 100" fill="none" stroke="#A0D8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 63 100 A 37 37 0 0 1 100 63" fill="none" stroke="#A0D8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 137 100 A 37 37 0 0 1 100 137" fill="none" stroke="#A0D8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 100 137 A 37 37 0 0 1 63 100" fill="none" stroke="#A0D8FF" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Inner arc -->
  <path d="M 100 76 A 24 24 0 0 1 124 100" fill="none" stroke="#C5EAFF" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 76 100 A 24 24 0 0 1 100 76" fill="none" stroke="#C5EAFF" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 124 100 A 24 24 0 0 1 100 124" fill="none" stroke="#C5EAFF" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 100 124 A 24 24 0 0 1 76 100" fill="none" stroke="#C5EAFF" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="7" fill="#FFFFFF" opacity="0.95"/>

  <!-- Text: आधार (Hindi) -->
  <text x="100" y="170" text-anchor="middle" font-family="'Noto Sans Devanagari', Arial, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="1">आधार</text>

  <!-- Text: AADHAAR (English) -->
  <text x="100" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#7EC8FF" letter-spacing="3">AADHAAR</text>
</svg>
